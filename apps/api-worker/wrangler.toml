name = "xiaohebao-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"

# ── 本地开发 ──────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "xiaohebao-dev"
database_id = "196c22f1-4522-46aa-a713-c62ddce327a1"

[vars]
ENABLE_DEV_BYPASS = "true"
SESSION_TTL_HOURS = "720"
APPLE_AUDIENCE = "com.meolord.xiaohebao"
APPLE_ISSUER = "https://appleid.apple.com"

# ── 生产环境（wrangler deploy --env production） ──────────
[env.production]
name = "xiaohebao-api-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "xiaohebao-prod"
database_id = "a62e57d0-c627-4435-a55a-2e9a6289fbd1"

[env.production.vars]
ENABLE_DEV_BYPASS = "false"
SESSION_TTL_HOURS = "720"
APPLE_AUDIENCE = "com.meolord.xiaohebao"
APPLE_ISSUER = "https://appleid.apple.com"

